# =============================================================================
# Shareholder Pipeline — Sources Configuration
# =============================================================================
# Edit this file to add new companies, change source URLs, or adjust settings.
# All URLs must include the scheme (https://).

# ---------------------------------------------------------------------------
# BSE India
# ---------------------------------------------------------------------------
bse:
  base_url: "https://www.bseindia.com"
  search_endpoint: "https://api.bseindia.com/BseIndiaAPI/api/ListofScripData/w?Group=&Scripcode=&industry=&segment=Equity&status=Active"
  company_page_pattern: "https://www.bseindia.com/stock-share-price/{slug}/{code}/"
  investor_page_keywords:
    - "investor"
    - "shareholder"
    - "iepf"

# ---------------------------------------------------------------------------
# NSE India
# ---------------------------------------------------------------------------
nse:
  base_url: "https://www.nseindia.com"
  search_endpoint: "https://www.nseindia.com/api/equity-stockIndices?index=NIFTY%20500"
  company_search_endpoint: "https://www.nseindia.com/api/search/autocomplete?q={query}"
  company_page_pattern: "https://www.nseindia.com/get-quotes/equity?symbol={symbol}"
  investor_page_keywords:
    - "investor"
    - "shareholder"
    - "iepf"

# ---------------------------------------------------------------------------
# PDF discovery settings
# ---------------------------------------------------------------------------
pdf_discovery:
  # Link text or URL fragments that indicate IEPF / shareholding PDFs
  link_keywords:
    - "iepf"
    - "unclaimed"
    - "dividend"
    - "shareholding"
    - "shareholder"
    - "pattern"
    - "annual report"
  # File extensions treated as downloadable documents
  file_extensions:
    - ".pdf"
    - ".PDF"

# ---------------------------------------------------------------------------
# Known companies — direct investor page URLs
