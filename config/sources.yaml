# ---------------------------------------------------------------------------
# Download behaviour
# ---------------------------------------------------------------------------
downloader:
  rate_limit_per_domain_seconds: 1.0   # minimum gap between requests to same domain
  max_retries: 3
  retry_backoff_seconds: 2             # base; doubled each retry (2, 4, 8)
  request_timeout_seconds: 30
  user_agent: >
    Mozilla/5.0 (Windows NT 10.0; Win64; x64)
    AppleWebKit/537.36 (KHTML, like Gecko)
    Chrome/121.0.0.0 Safari/537.36

# ---------------------------------------------------------------------------
# Output paths (relative to project root)
# ---------------------------------------------------------------------------
paths:
  input_dir: "data/input"
  logs_dir: "data/logs"
  downloader_log: "data/logs/downloader.log"
  failed_log: "data/logs/failed_downloads.log"
  progress_status: "data/logs/progress_status.json"
